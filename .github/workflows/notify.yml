name: WC Notifications

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:          # manual trigger for testing

permissions:
  contents: write             # needed to commit tournament_state.json back

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Run notifier
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python src/notify.py

      - name: Commit updated tournament state
        run: |
          git config user.name "raumdeuter-bot"
          git config user.email "bot@raumdeuter"
          git add data/tournament_state.json || true
          git diff --cached --quiet || git commit -m "chore: update tournament state [skip ci]"
          git push || true
